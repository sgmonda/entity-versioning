services:
  postgres:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ev_test
      POSTGRES_USER: ev_user
      POSTGRES_PASSWORD: ev_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ev_user -d ev_test"]
      interval: 2s
      timeout: 5s
      retries: 10

  mysql:
    image: mysql:8
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: ev_test_mysql
      MYSQL_USER: ev_user
      MYSQL_PASSWORD: ev_pass
      MYSQL_ROOT_PASSWORD: ev_root_pass
    command: --log-bin-trust-function-creators=1
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  mysqldata:
