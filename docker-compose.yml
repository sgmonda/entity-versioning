services:
  postgres:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ev_test
      POSTGRES_USER: ev_user
      POSTGRES_PASSWORD: ev_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ev_user -d ev_test"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
